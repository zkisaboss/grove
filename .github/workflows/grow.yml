name: Grow Tree

on:
  schedule:
    # Run at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  grow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Daily Growth
        run: node scripts/generate_day.js

      - name: Generate Daily Snapshot & GIF
        run: node scripts/snapshot_gif.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json assets/*.svg assets/*.gif data/snapshots/*.png
          git commit -m "Grow: Update daily data and assets" || exit 0
          git push
