  <text x="32" y="80" class="mono text-dim" font-size="10" letter-spacing="1.2" text-transform="uppercase">🌳 Vegetation Health</text><text x="387" y="80" class="mono text-base" font-size="14" font-weight="bold" text-anchor="end">4.47 mm/day</text><rect x="32" y="92" width="355" height="6" fill="rgba(255,255,255,0.04)" rx="3" /><rect x="32" y="92" width="317.36999999999995" height="6" fill="url(#grad-trees)" rx="3" /><text x="32" y="112" class="mono text-dim" font-size="9" opacity="0.7">ET₀ · Open-Meteo (rainforest avg)</text><text x="413" y="80" class="mono text-dim" font-size="10" letter-spacing="1.2" text-transform="uppercase">💨 Atmospheric CO₂</text><text x="768" y="80" class="mono text-base" font-size="14" font-weight="bold" text-anchor="end">431.57 ppm</text><rect x="413" y="92" width="355" height="6" fill="rgba(255,255,255,0.04)" rx="3" /><rect x="413" y="92" width="316.51382352941175" height="6" fill="url(#grad-co2)" rx="3" /><text x="413" y="112" class="mono text-dim" font-size="9" opacity="0.7">NOAA Mauna Loa Observatory</text><text x="32" y="155" class="mono text-dim" font-size="10" letter-spacing="1.2" text-transform="uppercase">⚡ Solar Irradiance</text><text x="387" y="155" class="mono text-base" font-size="14" font-weight="bold" text-anchor="end">287 W/m²</text><rect x="32" y="167" width="355" height="6" fill="rgba(255,255,255,0.04)" rx="3" /><rect x="32" y="167" width="127.35625" height="6" fill="url(#grad-renew)" rx="3" /><text x="32" y="187" class="mono text-dim" font-size="9" opacity="0.7">Shortwave · Open-Meteo</text><text x="413" y="155" class="mono text-dim" font-size="10" letter-spacing="1.2" text-transform="uppercase">🌊 Sea Surface Temp</text><text x="768" y="155" class="mono text-base" font-size="14" font-weight="bold" text-anchor="end">28.8°C</text><rect x="413" y="167" width="355" height="6" fill="rgba(255,255,255,0.04)" rx="3" /><rect x="413" y="167" width="326.6" height="6" fill="url(#grad-ocean)" rx="3" /><text x="413" y="187" class="mono text-dim" font-size="9" opacity="0.7">SST · Open-Meteo Marine (equatorial)</text><text x="32" y="230" class="mono text-dim" font-size="10" letter-spacing="1.2" text-transform="uppercase">🏭 Air Quality Index</text><text x="387" y="230" class="mono text-base" font-size="14" font-weight="bold" text-anchor="end">49 AQI</text><rect x="32" y="242" width="355" height="6" fill="rgba(255,255,255,0.04)" rx="3" /><rect x="32" y="242" width="86.975" height="6" fill="url(#grad-air)" rx="3" /><text x="32" y="262" class="mono text-dim" font-size="9" opacity="0.7">US AQI · Open-Meteo (6-city avg)</text><text x="413" y="230" class="mono text-dim" font-size="10" letter-spacing="1.2" text-transform="uppercase">🦎 Species Observed</text><text x="768" y="230" class="mono text-base" font-size="14" font-weight="bold" text-anchor="end">3.89B</text><rect x="413" y="242" width="355" height="6" fill="rgba(255,255,255,0.04)" rx="3" /><rect x="413" y="242" width="355" height="6" fill="url(#grad-wild)" rx="3" /><text x="413" y="262" class="mono text-dim" font-size="9" opacity="0.7">GBIF global occurrence records</text><rect x="32" y="320" width="736" height="48" rx="10" fill="rgba(74, 222, 128, 0.04)" stroke="rgba(74, 222, 128, 0.08)" stroke-width="1" />
